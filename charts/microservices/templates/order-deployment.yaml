apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservices-order
spec:
  replicas: {{ .Values.replicaCount.order }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
      - name: order
        image: {{ .Values.image.order }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: INVENTORY_URL
          valueFrom:
            configMapKeyRef:
              name: microservices-service-config
              key: inventory.url
        - name: ORDER_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: microservices-secret
              key: order.datasource.url
        - name: ORDER_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: microservices-secret
              key: datasource.username
        - name: ORDER_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: microservices-secret
              key: datasource.password
        - name: SECURITY_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: microservices-secret
              key: security.jwt.secret
        resources:
{{ toYaml .Values.resources.order | indent 10 }}
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order
  ports:
  - port: 8081
    targetPort: 8081
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: microservices-order-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: microservices-order
  minReplicas: {{ .Values.autoscaling.order.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.order.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.order.targetCPUUtilizationPercentage }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: microservices-order-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: order

