apiVersion: apps/v1
kind: Deployment
metadata:
  name: microservices-inventory
spec:
  replicas: {{ .Values.replicaCount.inventory }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: inventory
  template:
    metadata:
      labels:
        app: inventory
    spec:
      containers:
      - name: inventory
        image: {{ .Values.image.inventory }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8082
          name: http
        env:
        - name: INVENTORY_DATASOURCE_URL
          valueFrom:
            secretKeyRef:
              name: microservices-secret
              key: inventory.datasource.url
        - name: INVENTORY_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: microservices-secret
              key: datasource.username
        - name: INVENTORY_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: microservices-secret
              key: datasource.password
        - name: SECURITY_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: microservices-secret
              key: security.jwt.secret
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        resources:
{{ toYaml .Values.resources.inventory | indent 10 }}
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
      volumes:
      - name: config
        configMap:
          name: microservices-inventory-config
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
spec:
  selector:
    app: inventory
  ports:
  - port: 8082
    targetPort: 8082
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: microservices-inventory-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: microservices-inventory
  minReplicas: {{ .Values.autoscaling.inventory.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.inventory.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.inventory.targetCPUUtilizationPercentage }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: microservices-inventory-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: inventory

